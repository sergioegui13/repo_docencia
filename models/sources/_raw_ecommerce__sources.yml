version: 2

sources:
  - name: raw_ecommerce
    description: >
      Datos crudos del e-commerce (capa Bronze). En producción la puebla la
      herramienta de ingesta; en este repo de docencia la cargan los seeds.
    database: "{{ env_var('DBT_BRONZE_DB', target.database) }}"
    schema: ecommerce
    tables:
      - name: raw_orders
        description: Pedidos crudos (puede contener duplicados por order_id).
        config:
          loaded_at_field: order_date
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}
      - name: raw_customers
        description: Clientes crudos (emails sin normalizar, posibles duplicados).

