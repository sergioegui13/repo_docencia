version: 2

models:
  - name: stg_orders
    description: Pedidos curados (tipos y formato), sin deduplicar.
    columns:
      - name: order_id
        description: Identificador del pedido (puede repetirse antes de Silver).
      - name: status
        description: Estado del pedido, normalizado a minúsculas.
        data_tests:
          - accepted_values:
              values: ['pending', 'shipped', 'delivered', 'cancelled']
  - name: stg_customers
    description: Clientes curados (tipos y formato), sin deduplicar.
    columns:
      - name: customer_id
        description: Código de usuario
      - name: first_name
        description: Nombre del usuario
      - name: last_name
        description: Apellidos del usuario
      - name: email
        description: email
      - name: country_code
        description: Código internacional del país
      - name: created_at
        description: Fecha de creación del usuario
