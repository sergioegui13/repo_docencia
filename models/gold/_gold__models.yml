version: 2

models:
  - name: fct_orders
    description: Hechos de pedidos (capa Gold).
    columns:
      - name: order_id
        description: Clave primaria del hecho.
        data_tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error
                error_if: "> 100"
          
        

