version: 2

models:
  - name: stg_orders
    description: Pedidos curados (tipos y formato), sin deduplicar.
    columns:
      - name: order_id
        description: Identificador del pedido (puede repetirse antes de Silver).
      - name: status
        description: Estado del pedido, normalizado a minúsculas.
        data_tests:
          - accepted_values:
              arguments:
                values: ['pending', 'shipped', 'delivered', 'cancelled']

  - name: stg_customers
    description: Clientes curados desde Bronze, con tipado y normalización básica para consumo posterior y snapshots.
    columns:
      - name: customer_id
        description: Identificador del cliente en origen.
        data_tests:
          - not_null
      - name: first_name
        description: Nombre del cliente sin espacios laterales.
      - name: last_name
        description: Apellido del cliente sin espacios laterales.
      - name: email
        description: Email normalizado a minúsculas.
        data_tests:
          - not_null
      - name: country_code
        description: Código de país normalizado a mayúsculas.
      - name: created_at
        description: Fecha de alta del cliente convertida a timestamp para su uso en snapshots.
